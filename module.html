  <style>
    .module-hero { padding: 32px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); margin-bottom: 32px; position: relative; overflow: hidden; }
    .module-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 0%, rgba(255,255,255,0.04), transparent 50%); pointer-events: none; }
    .module-hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; }
    .module-hero p { font-size: 16px; line-height: 1.7; color: var(--fg-muted); margin-bottom: 8px; }
    .lessons { list-style: none; }
    .lessons li { padding: 20px 0; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 60px 1fr; gap: 16px; }
    .lessons li:last-child { border-bottom: none; }
    .lesson-num { font-family: var(--mono); color: var(--fg-dim); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; padding-top: 4px; }
    .lesson-body strong { color: var(--fg); display: block; margin-bottom: 4px; font-size: 16px; font-weight: 600; }
    .lesson-body p { color: var(--fg-muted); font-size: 14px; line-height: 1.65; }
    @media (max-width: 600px) {
      .lessons li { grid-template-columns: 50px 1fr; gap: 12px; padding: 16px 0; }
    }
  </style>
